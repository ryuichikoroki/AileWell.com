<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>News | AileWell</title>
    <meta name="description" content="Latest news and announcements from AileWell.">
    <link rel="icon" href="../assets/images/light%20blue%20-%20mark.jpg" type="image/jpeg">
    <link rel="apple-touch-icon" href="../assets/images/light%20blue%20-%20mark.jpg">
    <link rel="stylesheet" href="../vendor/fonts/fonts.css">
    <script src="../vendor/tailwind/tailwind.min.js"></script>
    <script>
    tailwind.config = {
        theme: {
            extend: {
                colors: {
                    primary: { DEFAULT: '#1d6fd8', dark: '#123d6e', light: '#eff6ff' },
                    accent: '#3b82f6',
                    body: '#1e2535',
                    muted: '#64748b',
                    surface: '#f5f8fc',
                },
                fontFamily: {
                    sans: ['"Noto Sans JP"', '"Inter"', 'sans-serif'],
                    display: ['"Inter"', '"Noto Sans JP"', 'sans-serif'],
                },
            },
        },
    }
    </script>
    <link href="../vendor/aos/aos.css" rel="stylesheet">
    <link rel="stylesheet" href="../vendor/fontawesome/all.min.css">
    <link rel="stylesheet" href="../css/custom.css">
</head>
<body class="text-body font-sans leading-relaxed relative overflow-x-hidden">

    <header id="site-header"></header>

    <main class="relative z-[1]">

        <section class="cta-gradient relative overflow-hidden pt-16 lg:pt-[72px]">
            <div class="relative z-10 max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-6 md:py-8">
                <p class="text-blue-200/50 text-xs font-bold tracking-[0.25em] uppercase mb-4 font-display" data-aos="fade-up">News</p>
                <h1 class="text-3xl sm:text-4xl md:text-5xl font-bold text-white leading-tight" data-aos="fade-up" data-aos-delay="100">News</h1>
            </div>
        </section>

        <section class="py-10 md:py-14 lg:py-20 bg-white">
            <div class="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8">
                <div class="flex flex-wrap gap-2 mb-10" data-aos="fade-up">
                    <span class="px-4 py-1.5 bg-primary text-white text-xs font-bold rounded-full">All</span>
                    <span class="px-4 py-1.5 bg-surface text-muted text-xs font-medium rounded-full cursor-pointer hover:bg-primary/10 transition-colors">Notice</span>
                    <span class="px-4 py-1.5 bg-surface text-muted text-xs font-medium rounded-full cursor-pointer hover:bg-primary/10 transition-colors">Press Release</span>
                </div>
                <div class="space-y-3" data-aos="fade-up" data-aos-delay="100">
                    <a href="#" class="news-card flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-6 bg-white border border-surface rounded-xl p-5 sm:p-6 hover:border-primary/20">
                        <div class="flex items-center gap-3 shrink-0">
                            <time class="text-muted text-sm font-display tabular-nums">2026.02.07</time>
                            <span class="text-xs font-bold text-primary bg-primary/10 px-3 py-1 rounded-full">Notice</span>
                        </div>
                        <p class="text-body font-medium text-sm sm:text-base">Our official website is now open.</p>
                    </a>
                    <a href="#" class="news-card flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-6 bg-white border border-surface rounded-xl p-5 sm:p-6 hover:border-primary/20">
                        <div class="flex items-center gap-3 shrink-0">
                            <time class="text-muted text-sm font-display tabular-nums">2026.02.01</time>
                            <span class="text-xs font-bold text-primary bg-primary/10 px-3 py-1 rounded-full">Notice</span>
                        </div>
                        <p class="text-body font-medium text-sm sm:text-base">News headline placeholder. Click for details.</p>
                    </a>
                    <a href="#" class="news-card flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-6 bg-white border border-surface rounded-xl p-5 sm:p-6 hover:border-primary/20">
                        <div class="flex items-center gap-3 shrink-0">
                            <time class="text-muted text-sm font-display tabular-nums">2026.01.15</time>
                            <span class="text-xs font-bold text-accent bg-accent/10 px-3 py-1 rounded-full">Press Release</span>
                        </div>
                        <p class="text-body font-medium text-sm sm:text-base">Press release or media coverage headline.</p>
                    </a>
                </div>
                <p class="text-muted text-xs mt-10 text-center" data-aos="fade-up">For detail pages, add HTML for each news item and update the links.</p>
            </div>
        </section>

    </main>

    <footer id="site-footer"></footer>

    <script defer src="js/components.js"></script>
    <script defer src="../vendor/alpinejs/cdn.min.js"></script>
    <script src="../vendor/aos/aos.js"></script>
    <script src="../js/main.js"></script>
</body>
</html>
